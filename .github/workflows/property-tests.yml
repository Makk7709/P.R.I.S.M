name: Property Tests (Proof Suite)

on:
  pull_request:
    paths:
      - 'src/core/ConsensusManager.js'
      - 'src/core/SecureJournalManager.js'
      - 'src/audit/TamperEvidentAuditLog.js'
      - 'src/security/contracts/**'
      - '__tests__/properties/**'
      - '__tests__/fuzz/**'
  push:
    branches:
      - main
      - develop
    paths:
      - 'src/core/ConsensusManager.js'
      - 'src/core/SecureJournalManager.js'
      - 'src/audit/TamperEvidentAuditLog.js'
      - 'src/security/contracts/**'
      - '__tests__/properties/**'
      - '__tests__/fuzz/**'

jobs:
  property-tests:
    name: Proof Suite (Property-Based + Fuzzing)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      
      - name: Property Tests - Consensus
        run: npm run test:properties -- __tests__/properties/consensus.properties.test.ts
        timeout-minutes: 2
      
      - name: Property Tests - Journal
        run: npm run test:properties -- __tests__/properties/journal.properties.test.ts
        timeout-minutes: 2
      
      - name: Fuzz Tests - Contracts
        run: npm run test:fuzz
        timeout-minutes: 1
