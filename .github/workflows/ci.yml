name: 🎯 PRISM CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  NODE_VERSION: '18'
  NPM_VERSION: 'latest'

jobs:
  # Core Testing & Quality Gates
  test-and-coverage:
    name: 🧪 Tests & Coverage
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        test-suite: [unit, consensus, enterprise, security, adapters, voice]
    
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4
      
    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: 📦 Install Dependencies
      run: npm ci
      
    - name: 🧪 Run Unit Tests
      if: matrix.test-suite == 'unit'
      run: npm test
      
    - name: 🧪 Run Consensus Tests
      if: matrix.test-suite == 'consensus'
      run: npm run test:consensus
      
    - name: 🧪 Run Enterprise Tests
      if: matrix.test-suite == 'enterprise'
      run: npm run test:enterprise
      
    - name: 🧪 Run Security Tests
      if: matrix.test-suite == 'security'
      run: npm run test:security
      
    - name: 🧪 Run Adapter Tests
      if: matrix.test-suite == 'adapters'
      run: npm run test -- tests/adapters/ --coverage
      
    - name: 🧪 Run Voice Analysis Tests
      if: matrix.test-suite == 'voice'
      run: pnpm vitest run tests/voice --coverage --reporter=verbose
      
    - name: 📊 Generate Coverage Report
      run: npm run coverage
      
    - name: 📤 Upload Coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage/lcov.info
        flags: ${{ matrix.test-suite }}
        
    - name: 📊 Coverage Quality Gate
      run: |
        echo "Checking coverage thresholds..."
        npm run coverage:check

  # Voice Analysis Quality Gate
  qa-voice:
    name: 🎤 Voice Analysis QA
    runs-on: ubuntu-latest
    needs: test-and-coverage
    
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4
      
    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: 📦 Install Dependencies
      run: npm ci
      
    - name: 🎤 Run Voice Analysis Tests with Coverage
      run: pnpm vitest run tests/voice --coverage --reporter=verbose
      
    - name: 📊 Generate Voice Coverage Report
      run: pnpm vitest run tests/voice --coverage --reporter=json --outputFile=coverage/voice-coverage.json
      
    - name: 📤 Upload Voice Coverage Artifacts
      uses: actions/upload-artifact@v3
      with:
        name: voice-coverage-report
        path: coverage/voice-coverage.json
        
    - name: 📈 Voice Analysis Performance Test
      run: pnpm vitest run tests/voice --reporter=verbose --testNamePattern="Performance"

  # Frozen Modules Protection
  frozen-modules-validation:
    name: 🔒 Frozen Modules Validation
    runs-on: ubuntu-latest
    needs: test-and-coverage
    
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4
      
    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: 📦 Install Dependencies
      run: npm ci
      
    - name: 🔒 Validate Frozen Modules
      run: |
        echo "🔒 Validating frozen modules: TrustContext, SecureJournalManager, ConsensusManager"
        
        # Check TrustContext integrity
        if [ -f "src/core/TrustContext.js" ]; then
          echo "✅ TrustContext.js exists"
          # Add specific validation logic for TrustContext
        else
          echo "❌ TrustContext.js missing"
          exit 1
        fi
        
        # Check SecureJournalManager integrity  
        if [ -f "src/core/SecureJournalManager.js" ]; then
          echo "✅ SecureJournalManager.js exists"
        else
          echo "❌ SecureJournalManager.js missing"
          exit 1
        fi
        
        # Check ConsensusManager integrity
        if [ -f "src/core/ConsensusManager.js" ]; then
          echo "✅ ConsensusManager.js exists"
        else
          echo "❌ ConsensusManager.js missing"
          exit 1
        fi
        
        echo "🔒 All frozen modules validated successfully"
        
    - name: 🧪 Run Frozen Module Tests
      run: |
        echo "Running specialized tests for frozen modules..."
        npm run test:consensus
        npm run test:enterprise

  # Security & Vulnerability Scanning
  security-scan:
    name: 🛡️ Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4
      
    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: 📦 Install Dependencies
      run: npm ci
      
    - name: 🔍 Run Security Audit
      run: npm run security:scan
      
    - name: 🔍 Run CodeQL Analysis
      uses: github/codeql-action/init@v2
      with:
        languages: javascript
        
    - name: 🔍 Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v2

  # API Contract Validation
  api-contract-validation:
    name: 📋 API Contract Validation
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4
      
    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: 📦 Install Dependencies
      run: npm ci
      
    - name: 📋 Validate OpenAPI Schema
      run: |
        echo "Validating OpenAPI schema..."
        if [ -f "backend/schemas/enterpriseExportSchema.json" ]; then
          echo "✅ OpenAPI schema exists"
          # Validate JSON syntax
          node -e "JSON.parse(require('fs').readFileSync('backend/schemas/enterpriseExportSchema.json', 'utf8')); console.log('✅ Valid JSON syntax')"
        else
          echo "❌ OpenAPI schema missing"
          exit 1
        fi
        
    - name: 📋 Run API Tests
      run: npm run test:enterprise:api

  # Performance & Load Testing
  performance-test:
    name: ⚡ Performance Test
    runs-on: ubuntu-latest
    needs: [test-and-coverage, security-scan]
    
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4
      
    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: 📦 Install Dependencies
      run: npm ci
      
    - name: ⚡ Run Performance Tests
      run: |
        echo "Running performance validation..."
        npm run validate:all

  # Build & Deploy Readiness
  build-validation:
    name: 🏗️ Build Validation
    runs-on: ubuntu-latest
    needs: [test-and-coverage, security-scan, api-contract-validation]
    
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4
      
    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: 📦 Install Dependencies
      run: npm ci
      
    - name: 🏗️ Validate Build
      run: |
        echo "Validating build readiness..."
        # Check if all required files exist
        if [ -f "server.js" ]; then
          echo "✅ Main server file exists"
        else
          echo "❌ Main server file missing"
          exit 1
        fi
        
        # Validate environment configuration
        if [ -f "env.example" ]; then
          echo "✅ Environment template exists"
        else
          echo "❌ Environment template missing"
          exit 1
        fi
        
        echo "✅ Build validation successful"

  # Final Quality Gate
  quality-gate:
    name: 🎯 Quality Gate
    runs-on: ubuntu-latest
    needs: [test-and-coverage, frozen-modules-validation, security-scan, api-contract-validation, performance-test, build-validation]
    if: always()
    
    steps:
    - name: 📊 Quality Gate Summary
      run: |
        echo "🎯 PRISM Quality Gate Results:"
        echo "✅ Tests: ${{ needs.test-and-coverage.result }}"
        echo "✅ Frozen Modules: ${{ needs.frozen-modules-validation.result }}"
        echo "✅ Security: ${{ needs.security-scan.result }}"
        echo "✅ API Contract: ${{ needs.api-contract-validation.result }}"
        echo "✅ Performance: ${{ needs.performance-test.result }}"
        echo "✅ Build: ${{ needs.build-validation.result }}"
        
        # Check if all required jobs passed
        if [[ "${{ needs.test-and-coverage.result }}" == "success" && 
              "${{ needs.frozen-modules-validation.result }}" == "success" && 
              "${{ needs.security-scan.result }}" == "success" && 
              "${{ needs.api-contract-validation.result }}" == "success" && 
              "${{ needs.performance-test.result }}" == "success" && 
              "${{ needs.build-validation.result }}" == "success" ]]; then
          echo "🎉 All quality gates passed! Ready for deployment."
          exit 0
        else
          echo "❌ Quality gate failed. Check individual job results."
          exit 1
        fi