name: 🛡️ PRISM Security Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run security scan daily at 2 AM UTC
    - cron: '0 2 * * *'

env:
  NODE_VERSION: '18'

jobs:
  # Dependency Vulnerability Scan
  dependency-scan:
    name: 🔍 Dependency Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4
      
    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: 📦 Install Dependencies
      run: npm ci
      
    - name: 🔍 Run npm Audit
      run: |
        echo "Running npm security audit..."
        npm audit --audit-level=moderate --json > audit-results.json || true
        
        # Check for high/critical vulnerabilities
        if npm audit --audit-level=high; then
          echo "✅ No high/critical vulnerabilities found"
        else
          echo "❌ High/critical vulnerabilities detected"
          cat audit-results.json
          exit 1
        fi
        
    - name: 🔍 Run Snyk Security Scan
      uses: snyk/actions/node@master
      continue-on-error: true
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --severity-threshold=high

  # Code Security Analysis
  code-security:
    name: 🔒 Code Security Analysis
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4
      
    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: 📦 Install Dependencies
      run: npm ci
      
    - name: 🔒 Run CodeQL Analysis
      uses: github/codeql-action/init@v2
      with:
        languages: javascript
        
    - name: 🔒 Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v2
      
    - name: 🔒 Check for Hardcoded Secrets
      run: |
        echo "Scanning for hardcoded secrets..."
        
        # Check for common secret patterns
        if grep -r "api[_-]?key" --include="*.js" --include="*.json" . | grep -v "your_.*_here" | grep -v "example"; then
          echo "❌ Potential hardcoded API keys found"
          exit 1
        fi
        
        if grep -r "secret" --include="*.js" --include="*.json" . | grep -v "your_.*_here" | grep -v "example"; then
          echo "❌ Potential hardcoded secrets found"
          exit 1
        fi
        
        if grep -r "password" --include="*.js" --include="*.json" . | grep -v "your_.*_here" | grep -v "example"; then
          echo "❌ Potential hardcoded passwords found"
          exit 1
        fi
        
        echo "✅ No hardcoded secrets detected"

  # Environment Security Validation
  environment-security:
    name: 🔐 Environment Security
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4
      
    - name: 🔐 Validate Environment Configuration
      run: |
        echo "Validating environment security configuration..."
        
        # Check env.example exists and is properly configured
        if [ -f "env.example" ]; then
          echo "✅ Environment template exists"
          
          # Check that sensitive values are properly templated
          if grep -q "your_.*_here" env.example; then
            echo "✅ Sensitive values properly templated"
          else
            echo "❌ Sensitive values may not be properly templated"
            exit 1
          fi
          
          # Check for required security variables
          required_vars=("OPENAI_API_KEY" "ANTHROPIC_API_KEY" "PERPLEXITY_API_KEY" "ELEVENLABS_API_KEY")
          for var in "${required_vars[@]}"; do
            if grep -q "$var" env.example; then
              echo "✅ $var documented"
            else
              echo "❌ $var missing from environment template"
              exit 1
            fi
          done
        else
          echo "❌ Environment template missing"
          exit 1
        fi
        
    - name: 🔐 Check .gitignore for Secrets
      run: |
        echo "Checking .gitignore for secret protection..."
        
        if [ -f ".gitignore" ]; then
          # Check that sensitive files are ignored
          sensitive_patterns=("*.env" ".env*" "*.key" "*.pem" "*.p12" "secrets/" "config/local*")
          
          for pattern in "${sensitive_patterns[@]}"; do
            if grep -q "$pattern" .gitignore; then
              echo "✅ $pattern properly ignored"
            else
              echo "⚠️ $pattern not in .gitignore (may be intentional)"
            fi
          done
        else
          echo "❌ .gitignore file missing"
          exit 1
        fi

  # Database Security Validation
  database-security:
    name: 🗄️ Database Security
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4
      
    - name: 🗄️ Validate Database Security
      run: |
        echo "Validating database security configuration..."
        
        # Check database setup files exist
        if [ -f "backend/database.js" ]; then
          echo "✅ Database configuration exists"
          
          # Check for SQL injection protections
          if grep -q "prepare\|prepareStatement" backend/database.js; then
            echo "✅ Prepared statements detected (SQL injection protection)"
          else
            echo "⚠️ No prepared statements detected"
          fi
        else
          echo "❌ Database configuration missing"
          exit 1
        fi
        
        # Check Supabase setup
        if [ -f "backend/setup_database.sql" ]; then
          echo "✅ Supabase schema exists"
          
          # Check for RLS policies
          if grep -q "row level security\|RLS" backend/setup_database.sql; then
            echo "✅ Row Level Security enabled"
          else
            echo "⚠️ Row Level Security not explicitly enabled"
          fi
        fi

  # API Security Validation
  api-security:
    name: 🔌 API Security
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4
      
    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: 📦 Install Dependencies
      run: npm ci
      
    - name: 🔌 Validate API Security
      run: |
        echo "Validating API security configuration..."
        
        # Check server.js for security middleware
        if [ -f "server.js" ]; then
          echo "✅ Main server file exists"
          
          # Check for security middleware
          if grep -q "helmet\|cors\|rate.*limit" server.js; then
            echo "✅ Security middleware detected"
          else
            echo "⚠️ Security middleware not detected"
          fi
        fi
        
        # Check OpenAPI schema for security schemes
        if [ -f "backend/schemas/enterpriseExportSchema.json" ]; then
          echo "✅ OpenAPI schema exists"
          
          if grep -q "securitySchemes\|BearerAuth\|ApiKeyAuth" backend/schemas/enterpriseExportSchema.json; then
            echo "✅ Security schemes defined in OpenAPI"
          else
            echo "❌ Security schemes missing from OpenAPI"
            exit 1
          fi
        fi
        
    - name: 🔌 Run Security Tests
      run: |
        echo "Running API security tests..."
        npm run test:security

  # Security Summary
  security-summary:
    name: 📊 Security Summary
    runs-on: ubuntu-latest
    needs: [dependency-scan, code-security, environment-security, database-security, api-security]
    if: always()
    
    steps:
    - name: 📊 Security Summary Report
      run: |
        echo "🛡️ PRISM Security Pipeline Results:"
        echo "🔍 Dependency Scan: ${{ needs.dependency-scan.result }}"
        echo "🔒 Code Security: ${{ needs.code-security.result }}"
        echo "🔐 Environment Security: ${{ needs.environment-security.result }}"
        echo "🗄️ Database Security: ${{ needs.database-security.result }}"
        echo "🔌 API Security: ${{ needs.api-security.result }}"
        
        # Calculate overall security score
        passed=0
        total=5
        
        if [[ "${{ needs.dependency-scan.result }}" == "success" ]]; then ((passed++)); fi
        if [[ "${{ needs.code-security.result }}" == "success" ]]; then ((passed++)); fi
        if [[ "${{ needs.environment-security.result }}" == "success" ]]; then ((passed++)); fi
        if [[ "${{ needs.database-security.result }}" == "success" ]]; then ((passed++)); fi
        if [[ "${{ needs.api-security.result }}" == "success" ]]; then ((passed++)); fi
        
        score=$((passed * 100 / total))
        echo "🎯 Security Score: $score% ($passed/$total checks passed)"
        
        if [[ $score -ge 80 ]]; then
          echo "✅ Security validation passed"
          exit 0
        else
          echo "❌ Security validation failed"
          exit 1
        fi
