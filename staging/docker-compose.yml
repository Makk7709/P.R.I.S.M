version: '3.9'

services:
  prism-staging:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: prism-staging
    environment:
      NODE_ENV: staging
      PRISM_MODE: staging
      PRISM_USE_REAL_PROVIDERS: ${PRISM_USE_REAL_PROVIDERS:-false}
      # Provider keys (from .env)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-3-5-sonnet-20241022}
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY:-}
      PERPLEXITY_BASE_URL: ${PERPLEXITY_BASE_URL:-}
      PERPLEXITY_MODEL: ${PERPLEXITY_MODEL:-llama-3.1-sonar-large-128k-online}
      # TrustContext config
      TRUSTCONTEXT_KEYS_DIR: /app/keys/approvers
      TRUSTCONTEXT_KEYREGISTRY_PATH: /app/data/key-registry.json
      TRUSTCONTEXT_APPROVAL_TIMEOUT_MS: ${TRUSTCONTEXT_APPROVAL_TIMEOUT_MS:-1800000}
      # Metrics
      METRICS_ENABLED: true
      METRICS_OUTPUT_DIR: /app/staging/metrics
    volumes:
      - ../keys:/app/keys:ro
      - ../data:/app/data
      - ./metrics:/app/staging/metrics
    ports:
      - "3001:3000"
    command: ["node", "server.js"]
    restart: "no"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 10s
      timeout: 5s
      retries: 3
