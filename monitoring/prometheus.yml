global:
  scrape_interval: 5s
  evaluation_interval: 5s
  external_labels:
    monitor: 'prism-stress-test'

rule_files:
  - "rules.yml"

scrape_configs:
  # PRISM Application Metrics
  - job_name: 'prism-app'
    static_configs:
      - targets: ['prism:9090']
    scrape_interval: 2s
    scrape_timeout: 1s
    metrics_path: '/metrics'
    honor_labels: true

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 10s

  # Health check endpoint
  - job_name: 'prism-health'
    static_configs:
      - targets: ['prism:9090']
    scrape_interval: 5s
    metrics_path: '/health'
    honor_labels: true

# Alerting configuration (optionnel pour les tests)
alerting:
  alertmanagers:
    - static_configs:
        - targets: [] 