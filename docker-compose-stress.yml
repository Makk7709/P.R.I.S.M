version: '3.8'

services:
  # Service PRISM principal
  prism:
    build:
      context: .
      dockerfile: Dockerfile.stress
    container_name: prism-stress-test
    ports:
      - "3000:3000"    # Application principale
      - "9090:9090"    # Métriques Prometheus
    environment:
      - NODE_ENV=stress-test
      - PROMETHEUS_PORT=9090
      - LOG_LEVEL=info
    volumes:
      - ./reports:/app/reports
      - ./logs:/app/logs
    networks:
      - prism-monitoring
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    mem_limit: 2g
    cpus: 2.0

  # Prometheus pour la collecte de métriques
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: prometheus-stress
    ports:
      - "9091:9090"    # Port externe différent pour éviter les conflits
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus-rules.yml:/etc/prometheus/rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=1h'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    networks:
      - prism-monitoring
    depends_on:
      - prism
    restart: unless-stopped

  # Grafana pour la visualisation
  grafana:
    image: grafana/grafana:10.0.0
    container_name: grafana-stress
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=prism123
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - grafana-data:/var/lib/grafana
    networks:
      - prism-monitoring
    depends_on:
      - prometheus
    restart: unless-stopped

  # Service de test de charge (optionnel, pour lancer les tests automatiquement)
  stress-runner:
    build:
      context: .
      dockerfile: Dockerfile.stress
    container_name: prism-stress-runner
    environment:
      - NODE_ENV=stress-test
      - PRISM_HOST=prism
      - PRISM_PORT=3000
    volumes:
      - ./reports:/app/reports
      - ./tests:/app/tests
    networks:
      - prism-monitoring
    depends_on:
      prism:
        condition: service_healthy
    command: ["node", "tests/load/stressDriver.js"]
    profiles:
      - stress-test  # Ce service ne démarre que si le profil stress-test est activé

networks:
  prism-monitoring:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  prometheus-data:
    driver: local
  grafana-data:
    driver: local 