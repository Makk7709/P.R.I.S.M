<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 PRISM Voice Chat V2 - API Integration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
            height: 90vh;
        }

        .chat-panel {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(76, 175, 80, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: rgba(76, 175, 80, 0.2);
            padding: 20px;
            border-bottom: 1px solid rgba(76, 175, 80, 0.3);
            text-align: center;
        }

        .chat-header h1 {
            color: #4CAF50;
            margin-bottom: 5px;
            font-size: 1.8em;
        }

        .api-status {
            font-size: 0.9em;
            color: #8BC34A;
            margin-top: 5px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            padding: 15px 20px;
            border-radius: 12px;
            max-width: 85%;
            word-wrap: break-word;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            background: rgba(33, 150, 243, 0.2);
            border: 1px solid rgba(33, 150, 243, 0.4);
            align-self: flex-end;
            color: #81C784;
        }

        .message.prism {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid rgba(76, 175, 80, 0.4);
            align-self: flex-start;
            color: #A5D6A7;
        }

        .message.system {
            background: rgba(255, 193, 7, 0.1);
            border: 1px solid rgba(255, 193, 7, 0.3);
            align-self: center;
            font-style: italic;
            color: #FFD54F;
            font-size: 0.9em;
        }

        .message.error {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid rgba(244, 67, 54, 0.4);
            align-self: center;
            color: #FFCDD2;
        }

        .model-badge {
            display: inline-block;
            background: rgba(156, 39, 176, 0.3);
            border: 1px solid rgba(156, 39, 176, 0.5);
            border-radius: 12px;
            padding: 2px 8px;
            font-size: 0.8em;
            margin-left: 8px;
            color: #CE93D8;
        }

        .processing-indicator {
            display: none;
            background: rgba(255, 152, 0, 0.2);
            border: 1px solid rgba(255, 152, 0, 0.4);
            border-radius: 12px;
            padding: 15px 20px;
            align-self: flex-start;
            color: #FFB74D;
        }

        .processing-indicator.active {
            display: block;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        .chat-input-area {
            background: rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(76, 175, 80, 0.3);
            padding: 20px;
        }

        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .text-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(76, 175, 80, 0.3);
            border-radius: 8px;
            padding: 12px 15px;
            color: #e0e0e0;
            font-size: 16px;
        }

        .text-input:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 0 2px rgba(76, 175, 80, 0.2);
        }

        .task-type-select {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(76, 175, 80, 0.3);
            border-radius: 8px;
            padding: 12px 15px;
            color: #e0e0e0;
            font-size: 14px;
            min-width: 120px;
        }

        .send-button, .voice-button {
            background: linear-gradient(45deg, #4CAF50, #8BC34A);
            border: none;
            border-radius: 8px;
            padding: 12px 20px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 100px;
        }

        .send-button:hover, .voice-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
        }

        .voice-button.active {
            background: linear-gradient(45deg, #f44336, #ff5722);
            animation: pulse 1s infinite;
        }

        .controls-panel {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(76, 175, 80, 0.3);
            padding: 25px;
            height: fit-content;
        }

        .controls-section {
            margin-bottom: 25px;
        }

        .controls-section h3 {
            color: #4CAF50;
            margin-bottom: 15px;
            font-size: 1.1em;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 0.9em;
        }

        .status-indicator.inactive {
            background: rgba(158, 158, 158, 0.2);
            color: #BDBDBD;
        }

        .status-indicator:not(.inactive) {
            background: rgba(76, 175, 80, 0.2);
            color: #A5D6A7;
        }

        .status-indicator::before {
            content: "●";
            margin-right: 8px;
            font-size: 1.2em;
        }

        .control-group {
            margin-bottom: 20px;
        }

        .control-group label {
            display: block;
            margin-bottom: 8px;
            color: #BDBDBD;
            font-size: 0.9em;
        }

        .slider {
            width: 100%;
            margin-bottom: 10px;
        }

        .select-control {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(76, 175, 80, 0.3);
            border-radius: 6px;
            padding: 8px 12px;
            color: #e0e0e0;
            font-size: 0.9em;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }

        .metric-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(76, 175, 80, 0.2);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }

        .metric-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #4CAF50;
            margin-bottom: 5px;
        }

        .metric-label {
            font-size: 0.8em;
            color: #BDBDBD;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            .input-row {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="chat-panel">
            <div class="chat-header">
                <h1>🎯 PRISM Voice Chat V2</h1>
                <div class="api-status">API Tri-Modèles Intégrée • Phase 2</div>
            </div>
            
            <div class="chat-messages" id="chatMessages">
                <!-- Messages will be added here -->
            </div>

            <div class="processing-indicator" id="processingIndicator">
                🤖 PRISM traite votre demande...
            </div>
            
            <div class="chat-input-area">
                <div class="input-row">
                    <input 
                        type="text" 
                        class="text-input" 
                        id="textInput" 
                        placeholder="Tapez votre message ici..." 
                        maxlength="1000"
                    >
                    <select class="task-type-select" id="taskTypeSelect">
                        <option value="auto">🤖 Auto-détection</option>
                        <option value="general">💬 Général</option>
                        <option value="strategie">🎯 Stratégie</option>
                        <option value="marketing">📈 Marketing</option>
                        <option value="finance">💰 Finance</option>
                        <option value="email">📧 Email</option>
                        <option value="ethique">⚖️ Éthique</option>
                        <option value="recherche">🔍 Recherche</option>
                        <option value="actualites">📰 Actualités</option>
                        <option value="veille">🔍 Veille</option>
                    </select>
                    <button class="send-button" id="sendButton">Envoyer</button>
                    <button class="voice-button" id="voiceButton">🎤 Voice</button>
                </div>
            </div>
        </div>
        
        <div class="controls-panel">
            <div class="controls-section">
                <h3>🎤 État Audio</h3>
                <div class="status-indicator inactive" id="micStatus">
                    <span id="micText">Microphone: Inactif</span>
                </div>
                <div class="status-indicator inactive" id="speechStatus">
                    <span id="speechText">Synthèse: Prête</span>
                </div>
            </div>
            
            <div class="controls-section">
                <h3>🔧 Paramètres Vocaux</h3>
                
                <div class="control-group">
                    <label for="voiceSelect">Voix:</label>
                    <select class="select-control" id="voiceSelect">
                        <!-- Voices will be populated dynamically -->
                    </select>
                </div>
                
                <div class="control-group">
                    <label for="volumeSlider">Volume: <span id="volumeValue">1.0</span></label>
                    <input type="range" class="slider" id="volumeSlider" min="0" max="1" step="0.1" value="1.0">
                </div>
                
                <div class="control-group">
                    <label for="rateSlider">Vitesse: <span id="rateValue">1.0</span></label>
                    <input type="range" class="slider" id="rateSlider" min="0.5" max="2" step="0.1" value="1.0">
                </div>
            </div>
            
            <div class="controls-section">
                <h3>📊 Métriques API</h3>
                <div class="metrics-grid">
                    <div class="metric-card">
                        <div class="metric-value" id="responseTime">-</div>
                        <div class="metric-label">Temps (ms)</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value" id="apiCalls">0</div>
                        <div class="metric-label">Appels API</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value" id="modelUsage">-</div>
                        <div class="metric-label">Modèle Actuel</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value" id="successRate">100%</div>
                        <div class="metric-label">Taux Succès</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        class PrismVoiceChatV2 {
            constructor() {
                this.initializeElements();
                this.initializeAudio();
                this.bindEvents();
                this.initializeMetrics();
                this.addWelcomeMessage();
                
                // API Configuration
                this.apiEndpoint = '/api/chat';
                this.isProcessing = false;
                
                console.log('[PRISM V2] Interface vocale initialisée avec API réelle');
            }

            initializeElements() {
                // Chat elements
                this.chatMessages = document.getElementById('chatMessages');
                this.textInput = document.getElementById('textInput');
                this.sendButton = document.getElementById('sendButton');
                this.voiceButton = document.getElementById('voiceButton');
                this.taskTypeSelect = document.getElementById('taskTypeSelect');
                this.processingIndicator = document.getElementById('processingIndicator');
                
                // Control elements
                this.micStatus = document.getElementById('micStatus');
                this.micText = document.getElementById('micText');
                this.speechStatus = document.getElementById('speechStatus');
                this.speechText = document.getElementById('speechText');
                this.voiceSelect = document.getElementById('voiceSelect');
                this.volumeSlider = document.getElementById('volumeSlider');
                this.rateSlider = document.getElementById('rateSlider');
                this.volumeValue = document.getElementById('volumeValue');
                this.rateValue = document.getElementById('rateValue');
                
                // Metrics elements
                this.responseTimeEl = document.getElementById('responseTime');
                this.apiCallsEl = document.getElementById('apiCalls');
                this.modelUsageEl = document.getElementById('modelUsage');
                this.successRateEl = document.getElementById('successRate');
            }

            initializeAudio() {
                // Speech Recognition
                this.recognition = null;
                this.isListening = false;
                
                if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                    this.recognition = new SpeechRecognition();
                    this.recognition.continuous = false;
                    this.recognition.interimResults = false;
                    this.recognition.lang = 'fr-FR';
                    
                    this.recognition.onstart = () => {
                        this.isListening = true;
                        this.updateMicStatus(true);
                        this.voiceButton.className = 'voice-button active';
                    };
                    
                    this.recognition.onresult = (event) => {
                        const transcript = event.results[0][0].transcript;
                        this.textInput.value = transcript;
                        this.sendMessage(transcript);
                    };
                    
                    this.recognition.onend = () => {
                        this.isListening = false;
                        this.updateMicStatus(false);
                        this.voiceButton.className = 'voice-button';
                    };
                    
                    this.recognition.onerror = (event) => {
                        console.error('Erreur reconnaissance vocale:', event.error);
                        this.addSystemMessage(`Erreur reconnaissance vocale: ${event.error}`);
                        this.isListening = false;
                        this.updateMicStatus(false);
                        this.voiceButton.className = 'voice-button';
                    };
                } else {
                    this.addSystemMessage('Reconnaissance vocale non supportée par ce navigateur');
                }

                // Speech Synthesis
                this.synthesis = window.speechSynthesis;
                this.voices = [];
                
                if (this.synthesis) {
                    this.loadVoices();
                    this.synthesis.onvoiceschanged = () => this.loadVoices();
                } else {
                    this.addSystemMessage('Synthèse vocale non supportée');
                }
            }

            initializeMetrics() {
                this.metrics = {
                    apiCalls: 0,
                    successfulCalls: 0,
                    averageResponseTime: 0,
                    responseTimes: [],
                    lastModel: null
                };
                
                // Update sliders display
                this.volumeSlider.addEventListener('input', () => {
                    this.volumeValue.textContent = this.volumeSlider.value;
                });
                
                this.rateSlider.addEventListener('input', () => {
                    this.rateValue.textContent = this.rateSlider.value;
                });
            }

            loadVoices() {
                this.voices = this.synthesis.getVoices();
                this.voiceSelect.innerHTML = '';
                
                const frenchVoices = this.voices.filter(voice => voice.lang.startsWith('fr'));
                const otherVoices = this.voices.filter(voice => !voice.lang.startsWith('fr'));
                
                [...frenchVoices, ...otherVoices].forEach((voice, index) => {
                    const option = document.createElement('option');
                    option.value = index;
                    option.textContent = `${voice.name} (${voice.lang})`;
                    if (voice.lang.startsWith('fr') && !this.voiceSelect.value) {
                        option.selected = true;
                    }
                    this.voiceSelect.appendChild(option);
                });
            }

            bindEvents() {
                this.voiceButton.addEventListener('click', () => this.toggleListening());
                this.sendButton.addEventListener('click', () => this.sendTextMessage());
                this.textInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter' && !this.isProcessing) this.sendTextMessage();
                });
            }

            toggleListening() {
                if (!this.recognition) {
                    this.addSystemMessage('Reconnaissance vocale non disponible');
                    return;
                }

                if (this.isListening) {
                    this.recognition.stop();
                } else {
                    try {
                        this.recognition.start();
                    } catch (error) {
                        console.error('Erreur démarrage reconnaissance:', error);
                        this.addSystemMessage('Impossible de démarrer la reconnaissance vocale');
                    }
                }
            }

            sendTextMessage() {
                const message = this.textInput.value.trim();
                if (message && !this.isProcessing) {
                    this.sendMessage(message);
                    this.textInput.value = '';
                }
            }

            async sendMessage(message) {
                if (this.isProcessing) {
                    this.addSystemMessage('⏳ Traitement en cours, veuillez patienter...');
                    return;
                }

                this.addUserMessage(message);
                this.isProcessing = true;
                this.showProcessingIndicator();
                
                // Disable input during processing
                this.textInput.disabled = true;
                this.sendButton.disabled = true;
                this.voiceButton.disabled = true;

                try {
                    const startTime = Date.now();
                    const taskType = this.getTaskType(message);
                    
                    const response = await this.callPrismAPI(message, taskType);
                    const endTime = Date.now();
                    const responseTime = endTime - startTime;
                    
                    this.updateMetrics(responseTime, response.metadata?.model, true);
                    this.addPrismMessage(response.content, response.metadata);
                    
                } catch (error) {
                    console.error('[PRISM V2] Erreur API:', error);
                    this.updateMetrics(0, null, false);
                    this.addErrorMessage(`Erreur de communication avec PRISM: ${error.message}`);
                } finally {
                    this.isProcessing = false;
                    this.hideProcessingIndicator();
                    
                    // Re-enable input
                    this.textInput.disabled = false;
                    this.sendButton.disabled = false;
                    this.voiceButton.disabled = false;
                    this.textInput.focus();
                }
            }

            async callPrismAPI(message, taskType) {
                const requestBody = {
                    message: message,
                    taskType: taskType === 'auto' ? this.detectTaskType(message) : taskType,
                    model: 'auto-select'
                };

                console.log('[PRISM V2] Appel API:', requestBody);

                const response = await fetch(this.apiEndpoint, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(requestBody)
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                
                if (!data.success) {
                    throw new Error(data.error || 'Erreur inconnue de l\'API');
                }

                return data;
            }

            getTaskType(message) {
                const selectedType = this.taskTypeSelect.value;
                return selectedType === 'auto' ? this.detectTaskType(message) : selectedType;
            }

            detectTaskType(message) {
                const lowerMessage = message.toLowerCase();
                
                // Patterns de détection automatique
                if (lowerMessage.includes('marketing') || lowerMessage.includes('campagne') || lowerMessage.includes('promotion')) {
                    return 'marketing';
                }
                if (lowerMessage.includes('finance') || lowerMessage.includes('budget') || lowerMessage.includes('coût') || lowerMessage.includes('prix')) {
                    return 'finance';
                }
                if (lowerMessage.includes('email') || lowerMessage.includes('mail') || lowerMessage.includes('courrier')) {
                    return 'email';
                }
                if (lowerMessage.includes('stratégie') || lowerMessage.includes('plan') || lowerMessage.includes('objectif')) {
                    return 'strategie';
                }
                if (lowerMessage.includes('éthique') || lowerMessage.includes('moral') || lowerMessage.includes('déontologie')) {
                    return 'ethique';
                }
                if (lowerMessage.includes('recherche') || lowerMessage.includes('études') || lowerMessage.includes('analyse')) {
                    return 'recherche';
                }
                if (lowerMessage.includes('actualité') || lowerMessage.includes('news') || lowerMessage.includes('événement')) {
                    return 'actualites';
                }
                
                return 'general';
            }

            updateMetrics(responseTime, model, success) {
                this.metrics.apiCalls++;
                if (success) {
                    this.metrics.successfulCalls++;
                    this.metrics.responseTimes.push(responseTime);
                    this.metrics.averageResponseTime = Math.round(
                        this.metrics.responseTimes.reduce((a, b) => a + b, 0) / this.metrics.responseTimes.length
                    );
                    this.responseTimeEl.textContent = responseTime;
                }
                
                if (model) {
                    this.metrics.lastModel = model;
                    this.modelUsageEl.textContent = model.toUpperCase();
                }
                
                this.apiCallsEl.textContent = this.metrics.apiCalls;
                this.successRateEl.textContent = Math.round((this.metrics.successfulCalls / this.metrics.apiCalls) * 100) + '%';
            }

            addUserMessage(message) {
                const messageDiv = document.createElement('div');
                messageDiv.className = 'message user';
                messageDiv.innerHTML = `<strong>Vous:</strong> ${this.escapeHtml(message)}`;
                this.chatMessages.appendChild(messageDiv);
                this.scrollToBottom();
            }

            addPrismMessage(message, metadata) {
                const messageDiv = document.createElement('div');
                messageDiv.className = 'message prism';
                
                let modelBadge = '';
                if (metadata?.model) {
                    const modelName = metadata.model.toUpperCase();
                    const fallbackText = metadata.fallback ? ' (Fallback)' : '';
                    modelBadge = `<span class="model-badge">${modelName}${fallbackText}</span>`;
                }
                
                // 🎯 CORRECTION: Préserver le formatage PRISM (émojis, structure)
                // Remplacer escapeHtml par formatPrismContent pour garder le formatage
                const formattedMessage = this.formatPrismContent(message);
                messageDiv.innerHTML = `<strong>🎯 PRISM:</strong> ${formattedMessage}${modelBadge}`;
                this.chatMessages.appendChild(messageDiv);
                this.scrollToBottom();
                
                // Synthèse vocale de la réponse (nettoyer pour la voix)
                this.speak(this.cleanTextForSpeech(message));
            }

            // 🎯 NOUVELLE FONCTION: Formatage PRISM intelligent
            formatPrismContent(message) {
                // Nettoyer seulement les scripts dangereux, préserver le formatage
                return message
                    .replace(/<script\b[^<]*(?:(?!<\/script>)<[^<]*)*<\/script>/gi, '')
                    .replace(/javascript:/gi, '')
                    .replace(/on\w+\s*=/gi, '')
                    // Convertir les retours à la ligne en <br>
                    .replace(/\n/g, '<br>')
                    // Préserver les émojis et caractères spéciaux
                    .replace(/###\s*(.+?)(?=\n|$)/g, '<h4 style="color: #4CAF50; margin: 10px 0 5px 0;">$1</h4>')
                    .replace(/##\s*(.+?)(?=\n|$)/g, '<h3 style="color: #4CAF50; margin: 15px 0 8px 0;">$1</h3>')
                    .replace(/\*\*(.+?)\*\*/g, '<strong style="color: #8BC34A;">$1</strong>')
                    .replace(/\*(.+?)\*/g, '<em style="color: #A5D6A7;">$1</em>');
            }

            // 🎯 NOUVELLE FONCTION: Nettoyer le texte pour la synthèse vocale
            cleanTextForSpeech(message) {
                return message
                    .replace(/🎯|📊|⚡|🔍|💡|⚖️|🎨|🧠|🎤|📈|💰|📧|🔄|✅|❌|🚨|💼|🌐|🎭/g, '')
                    .replace(/###\s*|##\s*|\*\*|\*/g, '')
                    .replace(/\n+/g, '. ')
                    .replace(/\s+/g, ' ')
                    .trim();
            }

            addSystemMessage(message) {
                const messageDiv = document.createElement('div');
                messageDiv.className = 'message system';
                messageDiv.textContent = message;
                this.chatMessages.appendChild(messageDiv);
                this.scrollToBottom();
            }

            addErrorMessage(message) {
                const messageDiv = document.createElement('div');
                messageDiv.className = 'message error';
                messageDiv.innerHTML = `<strong>❌ Erreur:</strong> ${this.escapeHtml(message)}`;
                this.chatMessages.appendChild(messageDiv);
                this.scrollToBottom();
            }

            addWelcomeMessage() {
                setTimeout(() => {
                    this.addPrismMessage(
                        "Bonjour ! Je suis PRISM V2 avec intégration API tri-modèles. " +
                        "Mes capacités incluent OpenAI, Claude et Perplexity selon le contexte. " +
                        "Comment puis-je vous aider aujourd'hui ?",
                        { model: 'system' }
                    );
                }, 1000);
            }

            showProcessingIndicator() {
                this.processingIndicator.classList.add('active');
            }

            hideProcessingIndicator() {
                this.processingIndicator.classList.remove('active');
            }

            speak(text) {
                if (!this.synthesis) return;
                
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.volume = parseFloat(this.volumeSlider.value);
                utterance.rate = parseFloat(this.rateSlider.value);
                
                if (this.voiceSelect.value && this.voices[this.voiceSelect.value]) {
                    utterance.voice = this.voices[this.voiceSelect.value];
                }
                
                utterance.onstart = () => {
                    this.speechStatus.classList.remove('inactive');
                    this.speechText.textContent = 'Synthèse: En cours';
                };
                
                utterance.onend = () => {
                    this.speechStatus.classList.add('inactive');
                    this.speechText.textContent = 'Synthèse: Prête';
                };
                
                this.synthesis.speak(utterance);
            }

            updateMicStatus(active) {
                if (active) {
                    this.micStatus.classList.remove('inactive');
                    this.micText.textContent = 'Microphone: Écoute';
                } else {
                    this.micStatus.classList.add('inactive');
                    this.micText.textContent = 'Microphone: Inactif';
                }
            }

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            scrollToBottom() {
                this.chatMessages.scrollTop = this.chatMessages.scrollHeight;
            }
        }

        // Initialiser l'interface vocale V2
        document.addEventListener('DOMContentLoaded', () => {
            new PrismVoiceChatV2();
        });
    </script>
</body>
</html>
