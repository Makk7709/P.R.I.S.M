<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 PRISM Voice Chat V2 - Interface Vocale Intelligente</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .background-animation {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(76, 175, 80, 0.1) 0%, transparent 50%);
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.1); }
        }

        .container {
            text-align: center;
            z-index: 10;
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 60px 40px;
            border: 1px solid rgba(76, 175, 80, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        h1 {
            background: linear-gradient(45deg, #4CAF50, #8BC34A, #CDDC39);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient 3s ease infinite;
            margin-bottom: 15px;
            font-size: 3rem;
            font-weight: 700;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .subtitle {
            color: #A5D6A7;
            font-size: 1.2rem;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
            padding: 0 20px;
        }

        .feature {
            background: rgba(76, 175, 80, 0.1);
            border: 1px solid rgba(76, 175, 80, 0.2);
            border-radius: 10px;
            padding: 15px;
            transition: all 0.3s ease;
        }

        .feature:hover {
            transform: translateY(-3px);
            border-color: rgba(76, 175, 80, 0.5);
        }

        .feature-icon {
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .feature-text {
            font-size: 0.9rem;
            color: #C8E6C9;
        }

        .button {
            background: linear-gradient(45deg, #4CAF50, #8BC34A);
            color: white;
            border: none;
            padding: 18px 40px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.3);
            margin-bottom: 20px;
        }

        .button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(76, 175, 80, 0.4);
        }

        .quick-links {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 30px;
        }

        .quick-link {
            background: rgba(255, 255, 255, 0.1);
            color: #A5D6A7;
            padding: 8px 16px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .quick-link:hover {
            background: rgba(76, 175, 80, 0.2);
            color: white;
            border-color: rgba(76, 175, 80, 0.5);
        }

        .status {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid rgba(76, 175, 80, 0.5);
            border-radius: 20px;
            padding: 8px 16px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4CAF50;
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0.3; }
        }

        @media (max-width: 768px) {
            .container {
                margin: 20px;
                padding: 40px 30px;
            }
            
            h1 {
                font-size: 2.5rem;
            }
            
            .features {
                grid-template-columns: 1fr;
            }
            
            .quick-links {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <div class="background-animation"></div>
    
    <div class="status">
        <div class="status-dot"></div>
        <span>PRISM V2 Actif</span>
    </div>

    <div class="container">
        <h1>🎯 PRISM Voice Chat V2</h1>
        <p class="subtitle">Interface Vocale Intelligente avec ElevenLabs</p>
        
        <div class="features">
            <div class="feature">
                <div class="feature-icon">🎤</div>
                <div class="feature-text">Reconnaissance Vocale</div>
            </div>
            <div class="feature">
                <div class="feature-icon">🔊</div>
                <div class="feature-text">Synthèse Premium</div>
            </div>
            <div class="feature">
                <div class="feature-icon">🧠</div>
                <div class="feature-text">IA Multi-Modèles</div>
            </div>
            <div class="feature">
                <div class="feature-icon">⚡</div>
                <div class="feature-text">Temps Réel</div>
            </div>
        </div>

        <a href="/ui/prismVoiceChatV2.html" class="button">🚀 Lancer l'Interface Vocale</a>
        
        <div class="quick-links">
            <a href="/ui/prismVoiceChatV2.html" class="quick-link">💬 Chat Vocal</a>
            <a href="/api/test-voice" class="quick-link" target="_blank">🔊 Test Audio</a>
            <a href="/GUIDE_DEMARRAGE_VOCAL.md" class="quick-link" target="_blank">📚 Guide</a>
        </div>
    </div>

    <script>
        // Auto-redirection après 3 secondes si l'utilisateur ne clique pas
        setTimeout(() => {
            console.log('🎯 Redirection automatique vers PRISM Voice Chat V2...');
            window.location.href = '/ui/prismVoiceChatV2.html';
        }, 5000);

        // Log de chargement
        console.log('%c🎯 PRISM Voice Chat V2 Interface de Démarrage', 'color: #4CAF50; font-size: 1.2em; font-weight: bold;');
        console.log('%c🎤 Interface vocale avec ElevenLabs prête !', 'color: #8BC34A;');
        
        // Précharger l'interface principale
        const preloadLink = document.createElement('link');
        preloadLink.rel = 'prefetch';
        preloadLink.href = '/ui/prismVoiceChatV2.html';
        document.head.appendChild(preloadLink);
    </script>
</body>
</html>
