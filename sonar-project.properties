# Test code: analyzed but reported as test sources.
sonar.tests=__tests__,tests,simulation,staging
sonar.test.inclusions=**/*.test.js,**/*.test.ts,**/*.spec.js,**/*.spec.ts

# S3516 ("function always returns the same value") is a false positive on
# test mocks and fast-check generators; suppress it on the test tree only.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S3516
sonar.issue.ignore.multicriteria.e1.resourceKey=__tests__/**/*
