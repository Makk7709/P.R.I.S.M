# SonarQube project configuration for PRISM
#
# Scope rationale (see docs/audit/sonar/SONAR_REMEDIATION_PLAN.md and
# SONAR_HOSTILE_AUDIT.md): the maintained, production-relevant surface is the
# transitive import closure of server.js (computed by docs/audit/sonar/triage.py)
# plus the active test tree. Legacy, demo, tooling and orphan modules that are
# NOT reachable from server.js and already excluded from CI (vitest/eslint) are
# excluded here as well, so the analysis reflects code that is actually
# maintained rather than dead code. Exclusions were verified to catch zero
# Tier-1 (production) and zero Tier-2 (active test) files.

sonar.projectKey=prism
sonar.projectName=PRISM
sonar.sources=.
sonar.sourceEncoding=UTF-8

# --- Never analyzed: dependencies, build output, coverage, vendored assets ---
sonar.exclusions=\
  node_modules/**,\
  dist/**,\
  coverage/**,\
  .prism-snapshots/**,\
  **/*.min.js,\
  utils/lz-string.js,\
  archives/**,\
  logs/**,\
  reports/**,\
  data/**,\
  test-audit-temp-*/**,\
  test-trustcontext-temp/**,\
  test-audit-manual/**,\
  test_journal/**,\
  test_orchestration_journal/**,\
  \
  # --- Legacy / excluded-from-CI test trees (already excluded by vitest) ---\
  legacy_tests/**,\
  __tests_legacy__/**,\
  __mocks__/**,\
  \
  # --- Pure non-production directories (tooling, demos, orphan modules) ---\
  ci/**,\
  core/**,\
  dashboard/**,\
  memory/**,\
  monitoring/**,\
  observability/**,\
  orchestration/**,\
  perf/**,\
  persistence/**,\
  regulation/**,\
  scripts/**,\
  security/**,\
  styles/**,\
  telemetry/**,\
  transforms/**,\
  utils/**,\
  integration/**,\
  grafana/**,\
  \
  # --- Standalone HTML demos / static pages (not part of the app graph) ---\
  **/*.html,\
  \
  # --- Root-level orphan scripts (demos, manual tests, launchers) ---\
  test-*.js,\
  demo-*.js,\
  launch-*.js,\
  validate-*.js,\
  simple-*.js,\
  quick-test*.js,\
  run-*.js,\
  audit-prism*.js,\
  fix-*.js,\
  final-*.js,\
  generate-*.js,\
  analyze-*.js,\
  security-verification-*.js,\
  \
  # --- Orphan modules outside the server.js closure (Tier 3) ---\
  asi/**,\
  evolution/launchSelfEvolutionCycle.js,\
  evolution/logSummary.js,\
  evolution/metricsTimer.js,\
  evolution/qualityCheckPerplexityResponse.js,\
  infrastructure/informationManagementLayer.js,\
  infrastructure/resilience.js,\
  infrastructure/safetyRunner.js,\
  infrastructure/selfMonitor.js,\
  audio.js,\
  particles.js,\
  perplexity_api.py,\
  prism-health-monitor.js,\
  prismAdapt.js,\
  prismAudit.js,\
  prismAwakening.js,\
  prismAwakeningRitual.js,\
  prismAwareness.js,\
  prismBond.js,\
  prismCleanup.js,\
  prismCodexAnalyzer.js,\
  prismContinuum.js,\
  prismCore.js,\
  prismEmergencyProtocol.js,\
  prismEthos.js,\
  prismForecast.js,\
  prismFusion.js,\
  prismGuardian.js,\
  prismHarmony.js,\
  prismHeartbeat.js,\
  prismHyperConsciousness.js,\
  prismInit.js,\
  prismInstinct.js,\
  prismIntent.js,\
  prismLaunch.js,\
  prismLegacyCore.js,\
  prismLoading.js,\
  prismMeta.js,\
  prismMood.js,\
  prismNoesis.js,\
  prismNotify.js,\
  prismObserver.js,\
  prismPerf.js,\
  prismPersistence.js,\
  prismPriority.js,\
  prismPulse.js,\
  prismReflex.js,\
