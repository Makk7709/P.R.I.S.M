sonar.test.inclusions=**/*.test.js,**/*.test.ts,**/*.spec.js,**/*.spec.ts

# --- Conventions de projet INTENTIONNELLES entérinées (PRISM_SONAR_CLOSEOUT) ---
# Chaque entrée ci-dessous neutralise un FAUX POSITIF dû à une convention
# délibérée, vérifié site par site (cf. SONAR_REMEDIATION_LOG « Phase 1 »).
# Aucune ne masque un vrai défaut : la portée est scopée au strict minimum.
#
# e1 : S3516 ("function always returns the same value") — faux positif sur les
#      mocks de test et les générateurs fast-check ; scopé à l'arbre de test.
# e2 : S125 ("commented-out code") — squelettes TDD des specs prismcore : blocs
#      commentés = CONTRATS d'API non encore implémentés (doc de test
#      intentionnelle, marqués `// ÉCHEC ATTENDU`), pas du code mort de prod.
#      Scopé aux seules specs prismcore concernées.
# e3 : S6564 ("redundant type aliases") — alias de domaine NOMINAUX du module
#      simulation (unités métier : NTU, µS/cm, °C, bar, mg/L). L'alias porte une
#      intention sémantique ; scopé au seul dossier métier `simulation/`.
#
# NB convention `_` (variable intentionnellement inutilisée) : la règle OSS
# `sonarjs/no-unused-vars` n'accepte pas de pattern ; côté SonarQube serveur,
# elle s'exprimerait via un paramètre de règle (`^_`). On NE l'encode PAS ici
# par une exclusion de fichier (qui masquerait les 14 vrais unused non préfixés
# de __tests_legacy__/) — la convention est appliquée, transparente, au niveau
# de la mesure locale (docs/audit/sonar/measure.mjs, bucket conventionSuppressed).
sonar.issue.ignore.multicriteria=e1,e2,e3
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S3516
sonar.issue.ignore.multicriteria.e1.resourceKey=__tests__/**/*
sonar.issue.ignore.multicriteria.e2.ruleKey=typescript:S125
sonar.issue.ignore.multicriteria.e2.resourceKey=__tests__/core/prismcore/**/*
sonar.issue.ignore.multicriteria.e3.ruleKey=typescript:S6564
sonar.issue.ignore.multicriteria.e3.resourceKey=simulation/**/*
