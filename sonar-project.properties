# SonarQube project configuration for PRISM
#
# Scope rationale (see docs/audit/sonar/SONAR_REMEDIATION_PLAN.md and
# SONAR_HOSTILE_AUDIT.md): the maintained, production-relevant surface is the
# transitive import closure of server.js (computed by docs/audit/sonar/triage.py)
# plus the active test tree. Legacy, demo, tooling and orphan modules that are
# NOT reachable from server.js and already excluded from CI (vitest/eslint) are
# excluded here as well, so the analysis reflects code that is actually
# maintained rather than dead code. Exclusions were verified to catch zero
# Tier-1 (production) and zero Tier-2 (active test) files.

sonar.projectKey=prism
sonar.projectName=PRISM
sonar.sources=.
sonar.sourceEncoding=UTF-8

# --- Never analyzed: dependencies, build output, coverage, vendored assets ---
sonar.exclusions=\
  node_modules/**,\
  dist/**,\
  coverage/**,\
  .prism-snapshots/**,\
  **/*.min.js,\
  utils/lz-string.js,\
